### ============================
### 1. Localisation et clavier
### ============================

d-i debian-installer/language string fr
d-i debian-installer/country string FR
d-i debian-installer/locale string fr_FR.UTF-8

d-i keyboard-configuration/xkb-keymap select fr
d-i keyboard-configuration/layoutcode string fr

### ============================
### 2. Réseau
### ============================

d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string local

### ============================
### 3. Miroirs Debian
### ============================

d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### ============================
### 4. Partitionnement automatique (LVM)
### ============================

d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-auto-lvm/guided_size string max
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### ============================
### 5. Utilisateur par défaut (vagrant/vagrant)
### ============================

d-i passwd/root-login boolean false
d-i passwd/user-fullname string vagrant
d-i passwd/username string vagrant
d-i passwd/user-password password vagrant
d-i passwd/user-password-again password vagrant
d-i user-setup/allow-password-weak boolean true

### ============================
### 6. Installation des paquets
### ============================

tasksel tasksel/first multiselect standard, ssh-server

d-i pkgsel/include string openssh-server sudo curl wget vim

### ============================
### 7. Configuration sudo pour Vagrant
### ============================

d-i preseed/late_command string \
    echo "vagrant ALL=(ALL) NOPASSWD: ALL" > /target/etc/sudoers.d/vagrant ; \
    chmod 440 /target/etc/sudoers.d/vagrant ; \
    mkdir -p /target/home/vagrant/.ssh ; \
    chmod 700 /target/home/vagrant/.ssh ; \
    wget --no-check-certificate https://raw.githubusercontent.com/hashicorp/vagrant/master/keys/vagrant.pub -O /target/home/vagrant/.ssh/authorized_keys ; \
    chmod 600 /target/home/vagrant/.ssh/authorized_keys ; \
    chown -R vagrant:vagrant /target/home/vagrant/.ssh ;

### ============================
### 8. Fin de l’installation
### ============================

d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i finish-install/reboot_in_progress note